<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajouter un message · Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111821;
      --panel-2: #17212b;
      --border: #263241;
      --text: #e8edf2;
      --muted: #9fb0c3;
      --accent: #4ea1ff;
      --success: #1f9d67;
      --danger: #d9534f;
      --warning: #d39e00;
      --shadow: 0 12px 30px rgba(0,0,0,.28);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #091017 0%, #0b0f14 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(760px, calc(100% - 32px));
      margin: 32px auto 56px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1.1;
    }

    .title-wrap p {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card-header {
      padding: 18px 18px 8px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }

    .card-header h2 {
      margin: 0 0 6px;
      font-size: 1.1rem;
    }

    .card-header p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: .95rem;
    }

    .card-body {
      padding: 18px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: .95rem;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(78,161,255,.15);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    .actions, .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .primary {
      background: var(--accent);
      color: #07111c;
    }

    .secondary {
      background: #243140;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .status {
      margin-top: 8px;
      min-height: 22px;
      color: var(--muted);
      font-size: .92rem;
    }

    .status.success { color: #64d6a0; }
    .status.error { color: #ff8b87; }
    .status.warning { color: #f3c965; }

    code.inline {
      padding: 2px 6px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 8px;
      color: #b8d9ff;
      font-size: .9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="title-wrap">
        <h1>Ajouter un message</h1>
        <p>Création d’un nouveau message dans la table <code class="inline">Messages</code> avec catégorie, type, sujet et corps.</p>
      </div>
      <div class="nav-actions">
        <a class="btn secondary" href="messages-liste.html">Voir les messages</a>
      </div>
    </header>

    <section class="card">
      <div class="card-header">
        <h2>Nouveau message</h2>
        <p>Les champs <strong>catégorie</strong>, <strong>type</strong>, <strong>sujet</strong> et <strong>corps</strong> sont obligatoires.</p>
      </div>
      <div class="card-body">
        <form id="message-form">
          <label>
            Catégorie
            <select id="categorie" name="categorie" required>
              <option value="meteo">meteo</option>
              <option value="trafic">trafic</option>
              <option value="autre">autre</option>
            </select>
          </label>

          <label>
            Type d’envoi
            <select id="type" name="type" required>
              <option value="mail">mail</option>
              <option value="whatsapp">whatsapp</option>
            </select>
          </label>

          <label>
            Sujet
            <input id="sujet" name="sujet" type="text" maxlength="250" placeholder="Ex. Alerte pluie intense" required />
          </label>

          <label>
            Corps
            <textarea id="corps" name="corps" placeholder="Saisissez le contenu du message…" required></textarea>
          </label>

          <div class="actions">
            <button class="btn primary" id="submit-btn" type="submit">Enregistrer</button>
            <button class="btn secondary" type="button" id="reset-btn">Réinitialiser</button>
          </div>

          <div id="form-status" class="status"></div>
        </form>
      </div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://vnjdnshvixzqawkewwfk.supabase.co";
    const SUPABASE_ANON_KEY = "VOTRE_CLE_ICI";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('message-form');
    const resetBtn = document.getElementById('reset-btn');
    const submitBtn = document.getElementById('submit-btn');
    const formStatus = document.getElementById('form-status');

    function setStatus(element, message = '', type = '') {
      element.textContent = message;
      element.className = `status ${type}`.trim();
    }

    async function createMessage(payload) {
      const { data, error } = await db
        .from('Messages')
        .insert(payload)
        .select('id, categorie, type, sujet, corps, source, created_at')
        .single();

      if (error) throw error;
      return data;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setStatus(formStatus, 'Enregistrement en cours…');
      submitBtn.disabled = true;

      const payload = {
        categorie: document.getElementById('categorie').value,
        type: document.getElementById('type').value,
        sujet: document.getElementById('sujet').value.trim(),
        corps: document.getElementById('corps').value.trim(),
        source: 'interface_web'
      };

      if (!payload.sujet || !payload.corps) {
        setStatus(formStatus, 'Le sujet et le corps sont obligatoires.', 'warning');
        submitBtn.disabled = false;
        return;
      }

      try {
        const created = await createMessage(payload);
        setStatus(formStatus, `Message #${created.id} enregistré avec succès.`, 'success');
        form.reset();
        document.getElementById('categorie').value = 'meteo';
        document.getElementById('type').value = 'mail';
      } catch (error) {
        console.error(error);
        setStatus(
          formStatus,
          `Impossible d’enregistrer le message : ${error.message || 'erreur inconnue'}`,
          'error'
        );
      } finally {
        submitBtn.disabled = false;
      }
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      document.getElementById('categorie').value = 'meteo';
      document.getElementById('type').value = 'mail';
      setStatus(formStatus, '');
    });
  </script>
</body>
</html>
